# used to create the object
name: diablo22

physics_engine: ${..physics_engine}

# if given, will override the device setting in gym. 
env:
  numEnvs: ${resolve_default:2048,${...num_envs}}
  envSpacing: 1
  episodeLength: 200
  test: ${resolve_default:False,${...test}}

  clipObservations: 5.0
  clipActions: 1.0

  startPositionNoise: 0.05
  startRotationNoise: 0.8
  diabloDofNoise: 0.25

  actionScale: 2.5
  dofVelocityScale: 0.1

  controlType: joint  # options are {joint, cartesian}

  asset:
    assetRoot: "../../assets"
    assetFileNamediablo: "urdf/323Assembase_limit3/urdf/centaur1.urdf"

    tableThickness: 0.25
    tableStandHeight: 0.05
    cubeSize: 0.025
    targetRadius: 0.022

  plane:
    staticFriction: 1.0    # [-]
    dynamicFriction: 1.0   # [-]
    restitution: 0.        # [-]

  baseInitState:
    pos: [-0.17, 0.0, 0.45] # x,y,z [m]
    rot: [ 0, 0, 0, 1 ] # x,y,z,w [quat]
    vLinear: [0.0, 0.0, 0.0]  # x,y,z [m/s]
    vAngular: [0.0, 0.0, 0.0]  # x,y,z [rad/s]
  randomCommandVelocityRanges:
    linear_x: [-1., 1.] # min max [m/s]
    yaw: [-1., 1.]          # min max [rad/s] {{{{{{{}}}}}}}
  control:
    stiffness: 
      head_pan: 125 # 0
      head_tilt: 125
      l_el: 250
      l_index_base: 125
      l_index_middle: 125
      l_index_tip: 125
      l_mid_base: 125
      l_mid_middle: 125
      l_mid_tip: 125
      l_sho_pitch: 250
      l_sho_roll: 250
      l_thumb_base: 125
      l_thumb_middle: 125
      l_thumb_tip: 125
      l_wrist: 125  #14
      l1: 1000 # 15
      l3: 1000
      l4: 1000
      r_el: 250
      r_index_base: 125
      r_index_middle: 125
      r_index_tip: 125
      r_mid_base: 125
      r_mid_middle: 125
      r_mid_tip: 125
      r_sho_pitch: 250
      r_sho_roll: 250
      r_thumb_base: 125
      r_thumb_middle: 125
      r_thumb_tip: 125
      r_wrist: 125
      r1: 1000
      r3: 1000
      r4: 1000  #33

    damping: 
      head_pan: 5
      head_tilt: 5
      l_el: 1
      l_index_base: 5
      l_index_middle: 5
      l_index_tip: 5
      l_mid_base: 5
      l_mid_middle: 5
      l_mid_tip: 5
      l_sho_pitch: 1
      l_sho_roll: 1
      l_thumb_base: 5
      l_thumb_middle: 5
      l_thumb_tip: 5
      l_wrist: 5
      l1: 1
      l3: 1
      l4: 1
      r_el: 1
      r_index_base: 5
      r_index_middle: 5
      r_index_tip: 5
      r_mid_base: 5
      r_mid_middle: 5
      r_mid_tip: 5
      r_sho_pitch: 1
      r_sho_roll: 1
      r_thumb_base: 5
      r_thumb_middle: 5
      r_thumb_tip: 5
      r_wrist: 5
      r1: 1
      r3: 1
      r4: 1

    actionScale: 1.57
    wheelActionScale: 30 # 30 rad/s max velocity for wheels
    controlFrequencyInv: 1 # 60 Hz      

  rewards:
    stdDist: 15


    weightDist: -1.0
    weightDistTanH: 1.2
    weightGripper: 1.0 # gripper_weight
    weightOri: -0.1
    weightActionRate: -0.001
    weightJointVel: -0.0001



  # control:
  #   # PD Drive parameters:
  #   stiffness: 1000.0  # [N*m/rad]
  #   damping: 20.0     # [N*m*s/rad]
  #   actionScale: 1
  #   powerScale: 0.1
  #   controlFrequencyInv: 1 # 60 Hz
  #   control_type: 'P' # P: position, V: velocity, T: torques
  #   KpGain: 1
  #   KdGain: 0.1   

  defaultJointAngles:  # = target angles when action = 0.0

    #left arm:2-14
    #left leg: 15-17
    #right arm:18-30
    #right leg: 31-33
    head_pan: 0
    head_tilt: 0
    l_sho_pitch: 0
    l_sho_roll: 1
    l_el: 1.4
    l_wrist: 0  
    l_index_base: 0
    l_index_middle: 0
    l_index_tip: 0
    l_mid_base: 0
    l_mid_middle: 0
    l_mid_tip: 0
    l_thumb_base: 0
    l_thumb_middle: 0
    l_thumb_tip: 0 #14
    l1: 0
    l3: 0
    l4: 0
    r1: 0 #18
    r3: 0
    r4: 0 
    r_sho_pitch: 0  #21
    r_sho_roll: -1
    r_el: -1.4
    r_wrist: 0
    r_index_base: 0
    r_index_middle: 0
    r_index_tip: 0 
    r_mid_base: 0
    r_mid_middle: 0
    r_mid_tip: 0 
    r_thumb_base: 0
    r_thumb_middle: 0
    r_thumb_tip: 0 #33


  urdfAsset:
    collapseFixedJoints: True
    # terminate_after_contacts_on: "hip"
    fixBaseLink: False
    defaultDofDriveMode: 4 # see GymDofDriveModeFlags (0 is none, 1 is pos tgt, 2 is vel tgt, 4 effort)
    # defaultDofDriveMode: 1 

  learn:
    # rewards
    linearVelocityXYRewardScale: 1.0
    angularVelocityZRewardScale: 0.5
    torqueRewardScale: -0.00000025
    heightRewardScale: 0.0001
    pitchRewardScale: -0.5
    fallRewardScale: -50
    syncRewardScale: 1

    # normalization
    linearVelocityScale: 2.0
    angularVelocityScale: 0.25
    dofPositionScale: 1.0
    dofVelocityScale: 0.05

    # episode length in seconds
    episodeLength_s: 50

  # viewer cam:
  viewer:
    refEnv: 0
    pos: [0, 0, 3]  # [m]
    lookat: [1., 1, 3.3]  # [m]

  # set to True if you use camera sensors in the environment
  enableCameraSensors: False


    

  

sim:
  dt: 0.02 # 1/60
  substeps: 2
  up_axis: "z"
  use_gpu_pipeline: ${eq:${...pipeline},"gpu"}
  gravity: [0.0, 0.0, -9.81]
  physx:
    num_threads: ${....num_threads}
    solver_type: ${....solver_type}
    use_gpu: ${contains:"cuda",${....sim_device}} # set to False to run on CPU
    num_position_iterations: 4
    num_velocity_iterations: 1
    contact_offset: 0.02
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 100.0
    default_buffer_size_multiplier: 5.0
    max_gpu_contact_pairs: 8388608 # 1024*1024
    num_subscenes: ${....num_subscenes}
    contact_collection: 1 # 0: CC_NEVER (don't collect contact info), 1: CC_LAST_SUBSTEP (collect only contacts on last substep), 2: CC_ALL_SUBSTEPS (broken - do not use!)

task:
  randomize: False
  randomization_params:
    frequency: 600   # Define how many environment steps between generating new randomizations
    observations:
      range: [0, .002] # range for the white noise
      operation: "additive"
      distribution: "gaussian"
    actions:
      range: [0., .02]
      operation: "additive"
      distribution: "gaussian"
    sim_params: 
      gravity:
        range: [0, 0.4]
        operation: "additive"
        distribution: "gaussian"
        schedule: "linear"  # "linear" will linearly interpolate between no rand and max rand
        schedule_steps: 3000
    actor_params:
      centaur:
        color: True
        rigid_body_properties:
          mass: 
            range: [0.5, 1.5]
            operation: "scaling"
            distribution: "uniform"
            setup_only: True # Property will only be randomized once before simulation is started. See Domain Randomization Documentation for more info.
            schedule: "linear"  # "linear" will linearly interpolate between no rand and max rand
            schedule_steps: 3000
        rigid_shape_properties:
          friction:
            num_buckets: 500
            range: [0.7, 1.3]
            operation: "scaling"
            distribution: "uniform"
            schedule: "linear"  # "linear" will scale the current random sample by `min(current num steps, schedule_steps) / schedule_steps`
            schedule_steps: 3000
          restitution:
            range: [0., 0.7]
            operation: "scaling"
            distribution: "uniform"
            schedule: "linear"  # "linear" will scale the current random sample by `min(current num steps, schedule_steps) / schedule_steps`
            schedule_steps: 3000
        dof_properties:
          damping: 
            range: [0.5, 1.5]
            operation: "scaling"
            distribution: "uniform"
            schedule: "linear"  # "linear" will scale the current random sample by `min(current num steps, schedule_steps) / schedule_steps`
            schedule_steps: 3000
          stiffness: 
            range: [0.5, 1.5]
            operation: "scaling"
            distribution: "uniform"
            schedule: "linear"  # "linear" will scale the current random sample by `min(current num steps, schedule_steps) / schedule_steps`
            schedule_steps: 3000
          lower:
            range: [0, 0.01]
            operation: "additive"
            distribution: "gaussian"
            schedule: "linear"  # "linear" will scale the current random sample by `min(current num steps, schedule_steps) / schedule_steps`
            schedule_steps: 3000
          upper:
            range: [0, 0.01]
            operation: "additive"
            distribution: "gaussian"
            schedule: "linear"  # "linear" will scale the current random sample by `min(current num steps, schedule_steps) / schedule_steps`
            schedule_steps: 3000



render:
  enableCameraLookAtEnv: True
  cameraLookAtEnvId: 0
  cameraPosition: [1.0, 1.0, 2.0]
  cameraTarget: [0.0, 0.0, 1.0]
  enableDebugVis: False