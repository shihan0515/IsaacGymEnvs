# used to create the object
name: DiabloGraspCustom3

physics_engine: ${..physics_engine}

env:
  numEnvs: ${resolve_default:4096,${...num_envs}}
  envSpacing: 0.5
  episodeLength: 300

  enableCameraSensors: False

  asset:
    assetRoot: "../../assets"
    assetFileNamediablo: "urdf/diab/Diablo_ger/Part_gripper_col_rev/URDF/diablo_erc_visualize.urdf"

  stiffness: 700
  damping: 50

  numActions: 14
  numObservations: 92

  dofNoise: 0.05
  startPositionNoise: 0.1
  startRotationNoise: 0.8

  actionScale: 2.5

  object:
    # # drill
    # objectRoot: "urdf/ycb/ycb_urdfs-main/ycb_assets/035_power_drill.urdf"
    # objectHeight: 0.1
    # objectHalfHeight: 0.05

    # mug
    objectRoot: "urdf/ycb/025_mug/025_mug.urdf"
    objectHeight: 0.085
    objectHalfHeight: 0.0425

    # # dumbbell
    # objectRoot: "urdf/dumbbell.urdf"
    # objectHeight: 0.128
    # objectHalfHeight: 0.064

  rewards:
    distRewardScale: 1.0
    rotRewardScale: 0.8
    liftRewardScale: 15.0
    graspRewardScale: 2.0
    orientationRewardScale: 5.0
    actionPenaltyScale: 0.001
    stabilityPenaltyScale: 1.0

sim:
  dt: 0.0166
  substeps: 2
  up_axis: "z"
  use_gpu_pipeline: ${eq:${...pipeline},"gpu"}
  gravity: [0.0, 0.0, -9.81]

  physx:
    num_threads: ${....num_threads}
    solver_type: ${....solver_type}
    num_position_iterations: 8
    num_velocity_iterations: 1
    contact_offset: 0.005
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 1000
    max_gpu_contact_pairs: 8388608
    default_buffer_size_multiplier: 5.0
    contact_collection: 0
