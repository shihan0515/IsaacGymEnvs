# used to create the object
name: DiabloGrasp

physics_engine: ${..physics_engine}

env:
  numEnvs: ${resolve_default:4096,${...num_envs}}
  envSpacing: 1.5
  episodeLength: 300

  # set to True if you use camera sensors in the environment
  enableCameraSensors: False

  # New asset path
  asset:
    assetRoot: "../../assets"
    assetFileNamediablo: "urdf/diab/Diablo_ger/Part_gripper_col_rev/URDF/diablo_erc1.urdf"

  # DOF properties
  stiffness: 700
  damping: 50

  # Action and observation space
  numActions: 14
  numObservations: 90

  # Noise settings
  dofNoise: 0.05
  startPositionNoise: 0.1
  startRotationNoise: 0.8

  # Action scaling
  actionScale: 2.5

  # Rewards scales
  rewards:
    distRewardScale: 1
    rotRewardScale: 0.8

    liftRewardScale: 5.0
    graspRewardScale: 2.0
    actionPenaltyScale: 0.001

sim:
  dt: 0.0166 # 1/60
  substeps: 2
  up_axis: "z"
  use_gpu_pipeline: ${eq:${...pipeline},"gpu"}
  gravity: [0.0, 0.0, -9.81]

  physx:
    num_threads: ${....num_threads}
    solver_type: ${....solver_type}
    num_position_iterations: 8
    num_velocity_iterations: 1
    contact_offset: 0.005
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 1000
    max_gpu_contact_pairs: 8388608
    default_buffer_size_multiplier: 5.0
    contact_collection: 0 # 0: CC_NEVER (don't collect contact info), 1: CC_LAST_SUBSTEP (collect only contacts on last substep), 2: CC_ALL_SUBSTEPS (broken - do not use!)
   # CC_ALL_CONTACTS
